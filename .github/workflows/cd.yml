name: CD

# Build the V3 BYOT storefront image and deploy it to the dev env
# (v3.test.numueg.app) on push to `dev`. Mirrors numu-egyptian-bazaar's
# CD where it's platform-standard (GHCR via GITHUB_TOKEN, droplet SSH via
# STAGING_* secrets) but deploys the dedicated v3 single-container service.
#
# Staging/prod are intentionally NOT wired yet — when promoting, add jobs
# that run a blue/green variant (see numu-egyptian-bazaar/scripts/deploy-storefront.sh).

on:
  push:
    branches: [dev]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: numu-io/numu-storefront

jobs:
  # ===========================================================================
  # Build + push the image to GHCR (tagged with branch name + commit SHA).
  # ===========================================================================
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=ref,event=branch

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # NEXT_PUBLIC_* are inlined into the client bundle at build time.
          build-args: |
            NEXT_PUBLIC_NUMU_ENV=test
            NEXT_PUBLIC_BYOT_BUNDLE_HOSTS=https://*.v3.test.numueg.app,https://test.numueg.app
            NEXT_PUBLIC_GOOGLE_MAPS_KEY=${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===========================================================================
  # Deploy to the dev env (v3.test.numueg.app) on the DO droplet.
  # ===========================================================================
  deploy-test:
    name: Deploy V3 storefront to Test (DO)
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/dev'
    steps:
      - uses: actions/checkout@v4

      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.STAGING_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "StrictHostKeyChecking no" >> ~/.ssh/config

      # Keep the droplet's copy of the compose file + deploy script in sync
      # with the repo so the deploy is reproducible from source.
      - name: Sync deploy assets to droplet
        run: |
          U="${{ secrets.STAGING_SSH_USER }}"; H="${{ secrets.STAGING_HOST }}"
          scp -i ~/.ssh/deploy_key deploy/docker-compose.storefront.v3.test.yml "$U@$H:/opt/numu/docker/docker-compose.storefront.v3.test.yml"
          scp -i ~/.ssh/deploy_key scripts/deploy-storefront-v3.sh "$U@$H:/opt/numu/deploy-storefront-v3.sh"

      - name: Deploy V3 storefront
        env:
          NUMU_STOREFRONT_V3_IMAGE: ${{ needs.build-and-push.outputs.image_ref }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_HOST }} << DEPLOY_SCRIPT
            set -e
            cd /opt/numu

            echo "==> Authenticating with GHCR..."
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin

            chmod +x /opt/numu/deploy-storefront-v3.sh
            export NUMU_STOREFRONT_V3_IMAGE="${NUMU_STOREFRONT_V3_IMAGE}"
            /opt/numu/deploy-storefront-v3.sh
          DEPLOY_SCRIPT
