name: Promote to Prod

# One-click promote dev → prod for the storefront (mirrors the API repo's
# Promote workflow). dev is the integration branch; clicking "Run workflow"
# fast-forwards prod to dev and deploys it to the prod EC2.
#
# Why the explicit dispatch: a push made with GITHUB_TOKEN does NOT trigger
# other workflows, so cd-prod.yml's `push: branches:[prod]` would not fire.
# We therefore push prod and then dispatch cd-prod.yml on the prod ref, whose
# deploy job runs whenever `github.ref == refs/heads/prod`.
on:
  workflow_dispatch:

concurrency:
  group: promote-prod
  cancel-in-progress: false

jobs:
  promote:
    name: dev → prod
    runs-on: ubuntu-latest
    permissions:
      contents: write # push prod
      actions: write # dispatch cd-prod.yml
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin --prune

      - name: Promote dev → prod
        run: |
          echo "==> Promoting prod ← dev"
          git checkout prod
          # Fast-forward when prod is an ancestor of dev (the common case);
          # fall back to a real merge if prod has diverged so the promote
          # never wedges on ff-only.
          git merge --ff-only origin/dev \
            || git merge --no-edit -m "Promote dev → prod" origin/dev
          git push origin prod

      - name: Trigger CD Prod
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "==> Dispatching CD Prod (EC2) on prod"
          gh workflow run cd-prod.yml --ref prod
