# =============================================================================
# nginx — dedicated EC2 edge for the V3 BYOT storefront (prod)
# =============================================================================
# Cloudflare (Flexible) terminates TLS and forwards HTTP to :80 here. This box
# is host-AGNOSTIC: it proxies EVERY Host to the storefront container, which
# resolves the tenant from the Host header using NUMU_PLATFORM_DOMAIN. So there
# is no per-store server block to maintain — adding a store is just a CF DNS
# record, no nginx change.
# =============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
events { worker_connections 1024; use epoll; multi_accept on; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format json_combined escape=json '{'
        '"time":"$time_local","remote_addr":"$remote_addr","host":"$host",'
        '"request":"$request","status":"$status","bytes":"$body_bytes_sent",'
        '"rt":"$request_time","urt":"$upstream_response_time","ua":"$http_user_agent"}';
    access_log /var/log/nginx/access.log json_combined;

    sendfile on; tcp_nopush on; tcp_nodelay on; keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    gzip on; gzip_vary on; gzip_proxied any; gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               application/xml text/javascript image/svg+xml application/wasm;

    # Trust Cloudflare for the real client IP.
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    real_ip_header CF-Connecting-IP;

    # Docker embedded DNS so the storefront upstream resolves at request time
    # (container can restart without an nginx reload).
    resolver 127.0.0.11 valid=30s ipv6=off;

    limit_req_zone $binary_remote_addr zone=sf_limit:10m rate=30r/s;

    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        client_max_body_size 15M;

        # Long-cache the immutable Next static + BYOT runtime assets.
        location ~* ^/(_next/static|__numu-runtime)/ {
            set $sf http://storefront:3000;
            proxy_pass $sf;
            proxy_set_header Host $host;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }

        location / {
            limit_req zone=sf_limit burst=60 nodelay;
            set $sf http://storefront:3000;
            proxy_pass $sf;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;   # CF terminated TLS
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 60s;

            # The merchant hub's theme editor iframes the live storefront. Any
            # add_header in a location drops inherited http-level headers, so
            # re-declare and let CSP frame-ancestors override the CF-stamped XFO.
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
            add_header Content-Security-Policy "frame-ancestors 'self' https://numueg.app https://*.numueg.app" always;
        }
    }
}
