# =============================================================================
# nginx — V3 BYOT storefront on the dev env: v3.test.numueg.app
# =============================================================================
# Add this to the shared nginx (numu-nginx-staging) config on the droplet —
# either as a conf.d include or pasted into /opt/numu/docker/nginx/nginx.conf.
# After editing:  docker exec numu-nginx-staging nginx -t && \
#                 docker exec numu-nginx-staging nginx -s reload
#
# Cloudflare SSL/TLS mode is "Flexible" (CF terminates TLS at the edge and
# talks to the origin over HTTP), so this is an HTTP (port 80) block — same as
# the other test/stage hostnames. The per-tenant wildcard *.v3.test serves
# <store>.v3.test.numueg.app.
#
# CSP frame-ancestors (for the merchant-hub theme-editor iframe) is emitted by
# the app itself (next.config.ts headers()), so it is intentionally NOT set
# here — setting it twice would emit a duplicate header.
# =============================================================================

server {
    listen 80;
    server_name v3.test.numueg.app *.v3.test.numueg.app;

    # Docker's embedded DNS resolver. Using a variable upstream + resolver lets
    # nginx start (and stay up) even when the storefront container is down or
    # mid-redeploy, re-resolving the name when it comes back — instead of
    # refusing to load the whole config on a missing upstream.
    resolver 127.0.0.11 valid=10s;

    # Generous body size for theme-bundle / asset uploads proxied through.
    client_max_body_size 25m;

    location / {
        set $v3_upstream http://numu-storefront-v3-test:3000;
        proxy_pass $v3_upstream;

        proxy_http_version 1.1;

        # Preserve the full host so the storefront middleware can resolve the
        # tenant from the subdomain (<store>.v3.test.numueg.app → store).
        # Requires NUMU_PLATFORM_DOMAIN=v3.test.numueg.app in the container env.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # Websocket / HMR upgrade passthrough.
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;
    }
}
