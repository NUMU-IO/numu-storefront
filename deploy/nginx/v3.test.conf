# =============================================================================
# nginx — V3 BYOT storefront on the dev env (parallel host)
# =============================================================================
# Add to the shared nginx (numu-nginx-staging): /opt/numu/docker/nginx/nginx.conf
# is one monolithic file (no conf.d include), edited in place with timestamped
# .bak backups. Insert these two server blocks near the other *-test blocks,
# then:  docker exec numu-nginx-staging nginx -t \
#     && docker exec numu-nginx-staging nginx -s reload
#
# Mirrors the existing "<store>-test.numueg.app" storefront block, but for the
# V3 host scheme that numu-storefront's middleware expects:
#   proxy.ts → storeIdentifier = hostname.slice(0, -(PLATFORM_DOMAIN+1))
# so with NUMU_PLATFORM_DOMAIN=v3.test.numueg.app the tenant is the LEFTMOST
# label of <store>.v3.test.numueg.app (a DOT, not bazaar's "<store>-test" hyphen).
#
# TLS: this needs a cert covering v3.test.numueg.app + *.v3.test.numueg.app
# (the apex *.numueg.app and *.test certs do NOT cover a 3-label wildcard).
# Issue it via the same DNS-01 flow used for *.test / *.staging — see
# deploy/DEPLOY-V3.md.
# =============================================================================

# --- Bare host: v3.test.numueg.app (landing / no-store) --------------------
server {
    listen 443 ssl;
    http2 on;
    listen [::]:443 ssl;
    server_name v3.test.numueg.app;

    ssl_certificate     /etc/letsencrypt/live/v3.test.numueg.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/v3.test.numueg.app/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $v3_upstream http://numu-storefront-v3-test:3000;
        proxy_pass $v3_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# --- Per-tenant: <store>.v3.test.numueg.app --------------------------------
server {
    listen 443 ssl;
    http2 on;
    listen [::]:443 ssl;
    server_name "~^[^.]+\.v3\.test\.numueg\.app$";

    ssl_certificate     /etc/letsencrypt/live/v3.test.numueg.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/v3.test.numueg.app/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 10M;

    location /api {
        limit_req zone=api_limit burst=50 nodelay;
        set $api_upstream http://numu-api-test:8000;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header Connection "";
    }

    location / {
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $v3_upstream http://numu-storefront-v3-test:3000;
        proxy_pass $v3_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # The merchant-hub theme editor iframes the live storefront. Adding any
        # add_header in a location stops inheritance of the http-level security
        # headers, so re-declare them and override framing via CSP (drops the
        # inherited X-Frame-Options). numu-storefront ALSO sets frame-ancestors
        # in next.config; nginx wins here to match the existing -test block.
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
        add_header Content-Security-Policy "frame-ancestors 'self' https://merchant-test.numueg.app" always;
    }
}
